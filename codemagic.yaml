workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    
    environment:
      node: 22
      xcode: latest 
    
    scripts:
      - npm install
      - chmod +x node_modules/.bin/cap
      - npm run build || true
      - npx cap sync ios
    
    artifacts:
      - ios/**/*.app
      - ios/**/*.ipa
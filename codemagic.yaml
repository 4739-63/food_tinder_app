workflows:
  ios_release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: 22
      xcode: latest
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App

    integrations:
      app_store_connect: Codemagic

    scripts:
      - npm install
      - chmod +x node_modules/.bin/cap
      - npm run build || true
      - npx cap sync ios
      - xcodebuild -project ios/App/App.xcodeproj -scheme App -sdk iphoneos -configuration Release -archivePath build/App.xcarchive DEVELOPMENT_TEAM=4AUJ52N26K CODE_SIGN_STYLE=Automatic -allowProvisioningUpdates archive

    artifacts:
      - build/**/Build/Products/**/*.ipa
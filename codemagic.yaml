workflows:
  ios-release:
    name: iOS Release FoodTinder
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 22
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.chris.foodtinder

      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App

    integrations:
      app_store_connect: Codemagic

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build || true

      - name: Sync Capacitor
        script: |
          chmod +x node_modules/.bin/cap || true
          npx cap sync ios

      - name: Ensure iOS push entitlements
        script: |
          cat > ios/App/App/App.entitlements <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>aps-environment</key>
              <string>production</string>
          </dict>
          </plist>
          EOF

          /usr/libexec/PlistBuddy -c "Set :UIBackgroundModes:0 remote-notification" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" ios/App/App/Info.plist || true

          /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" ios/App/App/Info.plist

          /usr/libexec/PlistBuddy -c "Set :CODE_SIGN_ENTITLEMENTS App/App.entitlements" ios/App/App.xcodeproj/project.pbxproj || true

      - name: Set up code signing
        script: |
          keychain initialize

          app-store-connect fetch-signing-files "com.chris.foodtinder" \
            --type IOS_APP_STORE \
            --create \
            --force
          
          keychain add-certificates
          xcode-project use-profiles

      - name: Verify signing (debug)
        script: |
          xcode-project show-build-settings --project ios/App/App.xcodeproj --scheme App | grep -i signing || true

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /Users/builder/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

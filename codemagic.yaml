workflows:
  ios_release:
    name: iOS Release Build
    instance_type: mac_mini_m1

    environment:
      node: 22
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.chris.foodtinder

    integrations:
      app_store_connect: Codemagic

    scripts:
      - npm install
      - chmod +x node_modules/.bin/cap
      - npm run build || true
      - npx cap sync ios

      - xcode-project use-profiles

      - |
        cat <<EOF > export_options.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
        </dict>
        </plist>
        EOF

      - xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App --export-options-plist export_options.plist
    
    artifacts:
      - build/ios/ipa/*.ipa
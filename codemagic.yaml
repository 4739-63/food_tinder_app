workflows:
  ios_release:
    name: iOS Release Build
    instance_type: mac_mini_m1

    environment:
      node: 22
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.chris.foodtinder

    integrations:
      app_store_connect: Codemagic

    scripts:
      - npm install
      - chmod +x node_modules/.bin/cap
      - npm run build || true
      - npx cap sync ios

      - xcode-project build-ipa --workspace ios/App/App.xcodeproj/App.xcworkspace --scheme App

    artifacts:
      - build/ios/ipa/*.ipa